name: Gazebo nightly

on:
  schedule:
    # 03:00 UTC daily
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      run_smolvla_infer:
        description: "Run SmolVLA infer gate (needs self-hosted GPU runner)"
        type: boolean
        default: false

jobs:
  gz-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ROS Gazebo + control deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ros-jazzy-ros-gz-sim ros-jazzy-ros-gz-bridge ros-jazzy-gz-ros2-control \
            ros-jazzy-ros2-control ros-jazzy-controller-manager \
            ros-jazzy-joint-state-broadcaster ros-jazzy-joint-trajectory-controller \
            ros-jazzy-robot-state-publisher ros-jazzy-xacro
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pip install "empy==3.3.4" catkin_pkg lark
      - name: Gazebo smoke Phase 1 + 2
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          ./scripts/gz_smoke_validate.sh all

  gz-smolvla-infer:
    if: github.event_name == 'workflow_dispatch' && inputs.run_smolvla_infer
    runs-on: [self-hosted, linux, gpu]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ROS Gazebo + control deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ros-jazzy-ros-gz-sim ros-jazzy-ros-gz-bridge ros-jazzy-gz-ros2-control \
            ros-jazzy-ros2-control ros-jazzy-controller-manager \
            ros-jazzy-joint-state-broadcaster ros-jazzy-joint-trajectory-controller \
            ros-jazzy-robot-state-publisher ros-jazzy-xacro
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,smolvla]"
      - run: pip install "empy==3.3.4" catkin_pkg lark
      - name: SmolVLA × Gazebo infer gate
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          ./scripts/gz_smolvla_validate.sh infer
