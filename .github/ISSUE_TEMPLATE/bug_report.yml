name: Bug report
description: Report a reproducible vla_ros2 bug.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: "What broke?"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include exact commands and minimal code.
      placeholder: |
        pip install -e ".[dev,cli,server]"
        vla-ros2 predict --model dummy --instruction "hello"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python, ROS2 distro, install command, optional extras."
    validations:
      required: true
